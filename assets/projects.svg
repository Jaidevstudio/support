<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-5%" width="110%" height="125%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#6d28d9" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="900" height="110" fill="url(#bg)" rx="12"/>

  <g filter="url(#s)">
    <rect x="20" y="18" width="200" height="74" rx="10" fill="url(#cardFill)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="20" y="18" width="200" height="3" rx="1" fill="#6d28d9"/>
    <text x="120" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">MotherTongue</text>
    <text x="120" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6d28d9" text-anchor="middle">Flagship Project</text>
    <text x="120" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Language Interpreters</text>
  </g>

  <g filter="url(#s)">
    <rect x="240" y="18" width="200" height="74" rx="10" fill="url(#cardFill)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="240" y="18" width="200" height="3" rx="1" fill="#2563eb"/>
    <text x="340" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Unique Profiles</text>
    <text x="340" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#2563eb" text-anchor="middle">Profile Inspiration</text>
    <text x="340" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Curated Collection</text>
  </g>

  <g filter="url(#s)">
    <rect x="460" y="18" width="200" height="74" rx="10" fill="url(#cardFill)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="460" y="18" width="200" height="3" rx="1" fill="#0891b2"/>
    <text x="560" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Support</text>
    <text x="560" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#0891b2" text-anchor="middle">Community Hub</text>
    <text x="560" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Help and Discussions</text>
  </g>

  <g filter="url(#s)">
    <rect x="680" y="18" width="200" height="74" rx="10" fill="url(#cardFill)" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="680" y="18" width="200" height="3" rx="1" fill="#d97706"/>
    <text x="780" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">About</text>
    <text x="780" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#d97706" text-anchor="middle">Our Mission</text>
    <text x="780" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Values and Vision</text>
  </g>
</svg>
