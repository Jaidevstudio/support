<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f0f4f8"/><stop offset="100%" style="stop-color:#e8edf2"/></linearGradient>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#6d28d9"/><stop offset="100%" style="stop-color:#2563eb"/></linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0891b2"/><stop offset="100%" style="stop-color:#059669"/></linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#0891b2"/></linearGradient>
    <linearGradient id="p4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#059669"/><stop offset="100%" style="stop-color:#0891b2"/></linearGradient>
    <linearGradient id="p5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#d97706"/><stop offset="100%" style="stop-color:#dc2626"/></linearGradient>
    <filter id="s"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="900" height="160" fill="url(#bg)" rx="12"/>

  <!-- Card 1: MotherTongue -->
  <rect x="20" y="20" width="165" height="120" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="20" y="20" width="165" height="3" rx="2" fill="url(#p1)"/>
  <text x="102" y="58" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">MotherTongue</text>
  <text x="102" y="76" font-family="'Segoe UI',sans-serif" font-size="9" fill="#6d28d9" text-anchor="middle">Flagship Project</text>
  <text x="102" y="92" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Language Interpreters</text>
  <text x="102" y="108" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">17 Languages</text>

  <!-- Card 2: DevToolkit -->
  <rect x="200" y="20" width="165" height="120" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="200" y="20" width="165" height="3" rx="2" fill="url(#p2)"/>
  <text x="282" y="58" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">DevToolkit</text>
  <text x="282" y="76" font-family="'Segoe UI',sans-serif" font-size="9" fill="#0891b2" text-anchor="middle">Developer Utilities</text>
  <text x="282" y="92" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">HTML/CSS/JS Tools</text>
  <text x="282" y="108" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">10 Tools</text>

  <!-- Card 3: Challenges -->
  <rect x="380" y="20" width="165" height="120" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="380" y="20" width="165" height="3" rx="2" fill="url(#p4)"/>
  <text x="462" y="58" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">Challenges</text>
  <text x="462" y="76" font-family="'Segoe UI',sans-serif" font-size="9" fill="#059669" text-anchor="middle">Weekly Coding</text>
  <text x="462" y="92" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Any Language</text>
  <text x="462" y="108" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">All Levels</text>

  <!-- Card 4: CodeSnippets -->
  <rect x="560" y="20" width="165" height="120" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="560" y="20" width="165" height="3" rx="2" fill="url(#p5)"/>
  <text x="642" y="58" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">CodeSnippets</text>
  <text x="642" y="76" font-family="'Segoe UI',sans-serif" font-size="9" fill="#d97706" text-anchor="middle">Reusable Code</text>
  <text x="642" y="92" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">8 Languages</text>
  <text x="642" y="108" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Copy Paste Build</text>

  <!-- Card 5: Unique Profiles -->
  <rect x="740" y="20" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#s)"/>
  <rect x="740" y="20" width="140" height="3" rx="2" fill="url(#p3)"/>
  <text x="810" y="58" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Unique Profiles</text>
  <text x="810" y="76" font-family="'Segoe UI',sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">Inspiration</text>
  <text x="810" y="92" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Curated Collection</text>
  <text x="810" y="108" font-family="'Segoe UI',sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Add Yours</text>
