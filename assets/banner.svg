<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="50%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow3d" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#6d28d9" flood-opacity="0.12"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" fill="url(#bg)" rx="16"/>

  <!-- Subtle 3D perspective grid -->
  <g opacity="0.06" stroke="#6d28d9" stroke-width="0.8" fill="none">
    <line x1="100" y1="250" x2="450" y2="160"/>
    <line x1="200" y1="250" x2="470" y2="160"/>
    <line x1="300" y1="250" x2="490" y2="160"/>
    <line x1="400" y1="250" x2="510" y2="160"/>
    <line x1="500" y1="250" x2="530" y2="160"/>
    <line x1="600" y1="250" x2="550" y2="160"/>
    <line x1="700" y1="250" x2="570" y2="160"/>
    <line x1="800" y1="250" x2="590" y2="160"/>
    <line x1="50" y1="190" x2="850" y2="190"/>
    <line x1="80" y1="210" x2="820" y2="210"/>
    <line x1="110" y1="230" x2="790" y2="230"/>
  </g>

  <!-- Floating orbs -->
  <circle cx="120" cy="60" r="80" fill="url(#orb1)"/>
  <circle cx="780" cy="90" r="100" fill="url(#orb2)"/>
  <circle cx="400" cy="220" r="70" fill="url(#orb3)"/>

  <!-- 3D floating card -->
  <rect x="175" y="28" width="550" height="135" rx="14" fill="url(#cardFill)" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow3d)"/>
  <rect x="175" y="28" width="550" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="450" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1e293b" text-anchor="middle" filter="url(#softGlow)">JAIDEVSTUDIO</text>

  <!-- Subtitle -->
  <text x="450" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Community Support Hub</text>

  <!-- Tagline -->
  <text x="450" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6d28d9" text-anchor="middle" letter-spacing="4">OPEN SOURCE FOR EVERYONE</text>

  <!-- Accent line at bottom -->
  <rect x="100" y="178" width="700" height="2" fill="url(#accent)" rx="1" opacity="0.4"/>

  <!-- Corner accents -->
  <path d="M0 16 Q0 0 16 0 L55 0" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
  <path d="M0 16 Q0 0 16 0 L0 55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
  <path d="M900 16 Q900 0 884 0 L845 0" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
  <path d="M900 16 Q900 0 884 0 L900 55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>
  <path d="M0 234 Q0 250 16 250 L55 250" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>
  <path d="M900 234 Q900 250 884 250 L845 250" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>
</svg>
