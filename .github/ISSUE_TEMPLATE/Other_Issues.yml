name: General Issue
description: For anything that does not fit the other categories
title: "[GENERAL] "
labels: [triage]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ### General Issue

        Use this form for anything that does not fit the other templates.
        Please provide enough detail so we can understand and respond effectively.

        ---

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Question about the organization
        - Suggestion or feedback
        - Request for help
        - Collaboration proposal
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like to share?
      description: Provide a clear explanation of your issue, question, or suggestion
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any extra context, links, or screenshots that would help us understand
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        Prefer real-time conversation? Join [Discord](https://discord.gg/wXFWgsAuzR).
